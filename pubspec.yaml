name: akasuts
description: "Application Mobile pour l'Université Thomas Sankara."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  font_awesome_flutter: 10.6.0
  url_launcher: ^6.2.5
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  cloudinary_public: ^0.23.1
  connectivity_plus: ^5.0.2
  cinetpay: ^1.0.7
  cached_network_image: ^3.3.1
  dio: ^5.4.0
  path_provider: ^2.1.2
  flutter_pdfview: ^1.3.2
  flutter_launcher_icons: ^0.13.1

  # Versions verrouillées pour compatibilité
  firebase_core: 2.24.2
  firebase_auth: 4.16.0
  cloud_firestore: 4.13.1
  firebase_storage: 11.5.2

  flutter_inappwebview: ^6.0.0

dependency_overrides:
  # Fix pour Auth Web (customJSList)
  firebase_auth_web: 5.8.1
  firebase_auth_platform_interface: 6.19.0

  # Fix pour Firestore (AggregateQuerySnapshot error)
  cloud_firestore: 4.13.1
  cloud_firestore_web: 3.8.1
  cloud_firestore_platform_interface: 6.0.0 # <--- C'est lui qui réglera l'erreur 'sum'

  # Autres fix indispensables
  firebase_core_web: 2.10.0
  flutter_inappwebview: ^6.0.0
  font_awesome_flutter: 10.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/campus.jpg
    - assets/images/etudiant.jpg
    - assets/images/evenement.jpg
    - assets/images/logo_uts.jpg
    - assets/images/etudiante.jpg
    - assets/images/etudiants.jpg
    - assets/images/logo-akasuts-512.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo-akasuts-512.png"
  remove_alpha_ios: true