name: akasuts
description: "Application Mobile pour l'Université Thomas Sankara."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  font_awesome_flutter: ^10.7.0
  url_launcher: ^6.2.5
  image_picker: 1.0.7 # On enlève le ^ pour figer cette version
  connectivity_plus: ^5.0.2
  cinetpay: ^1.0.7

  # Versions compatibles avec Flutter 3.2.6
  firebase_core: 2.27.0
  firebase_auth: 4.17.8
  cloud_firestore: 4.15.8
  firebase_storage: 11.6.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0 # Mis à jour pour correspondre au SDK actuel

flutter:
  uses-material-design: true

  # Vérifie bien que ces dossiers existent réellement dans ton projet !
  assets:
    - assets/images/campus.jpg
    - assets/images/etudiant.jpg
    - assets/images/evenement.jpg
    - assets/images/logo_uts.jpg