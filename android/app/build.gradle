plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

// Syntaxe Groovy directe pour éviter les erreurs "Cannot resolve symbol"
def localProperties = new java.util.Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

android {
    // Identifiant unique de ton application AKASUTS
    namespace "com.example.akasuts"

    // Correction impérative : passage au SDK 34 pour compatibilité plugins
    compileSdkVersion 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        applicationId "com.example.akasuts"

        // Configuration minimale et cible
        minSdkVersion 21
        targetSdkVersion 34

        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            // Pour l'instant on utilise la config debug pour autoriser le build sans keystore perso
            signingConfig signingConfigs.debug

            // On désactive le masquage de code pour éviter les erreurs de ressources (AAPT2)
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // Firebase Bill of Materials (BOM) pour gérer les versions automatiquement
    implementation platform('com.google.firebase:firebase-bom:32.7.0')
    implementation 'com.google.firebase:firebase-analytics'
}

// Application du plugin Google Services pour Firebase
apply plugin: 'com.google.gms.google-services'